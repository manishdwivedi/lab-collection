# LabCollect Production Nginx Configuration
# Place in: /etc/nginx/sites-available/labcollect
# Enable: ln -s /etc/nginx/sites-available/labcollect /etc/nginx/sites-enabled/
# SSL: sudo certbot --nginx -d yourdomain.com

# ── Redirect HTTP → HTTPS ──────────────────────────────────
server {
    listen 80;
    server_name yourdomain.com www.yourdomain.com;
    return 301 https://$server_name$request_uri;
}

# ── Main HTTPS server ──────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name yourdomain.com www.yourdomain.com;

    # SSL — managed by Certbot
    ssl_certificate     /etc/letsencrypt/live/yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/yourdomain.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers (supplement what Helmet sets at app level)
    add_header X-Frame-Options         "DENY"            always;
    add_header X-Content-Type-Options  "nosniff"         always;
    add_header Referrer-Policy         "strict-origin"   always;
    add_header Permissions-Policy      "camera=(), microphone=(), geolocation=()" always;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
    gzip_min_length 256;

    # Max upload size (must match your multer limit)
    client_max_body_size 25M;

    # Request timeout
    proxy_connect_timeout  10s;
    proxy_send_timeout     30s;
    proxy_read_timeout     30s;

    # ── React Frontend ─────────────────────────────────────
    location / {
        root  /var/www/labcollect/frontend/build;
        try_files $uri $uri/ /index.html;

        # Cache static assets aggressively
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2)$ {
            expires     1y;
            add_header  Cache-Control "public, immutable";
        }
    }

    # ── API Proxy ──────────────────────────────────────────
    location /api/ {
        proxy_pass         http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host       $host;
        proxy_set_header   X-Real-IP  $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # ── Health check (no auth, no logging) ─────────────────
    location /health {
        proxy_pass   http://127.0.0.1:5000/health;
        access_log   off;
    }

    # ── Block direct access to uploads dir ─────────────────
    # Files are served via the authenticated /api/reports/:id/download endpoint
    location /uploads/ {
        deny all;
        return 403;
    }

    # ── Block sensitive files ───────────────────────────────
    location ~ /\.(env|git|gitignore|htaccess) {
        deny all;
        return 404;
    }
}
